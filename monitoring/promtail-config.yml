server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logları
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

  # Gateway audit log (JSONL)
  - job_name: gateway-audit
    static_configs:
      - targets: [localhost]
        labels:
          job: bankai-audit
          source: gateway
          __path__: /var/log/bankai/audit/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            user: user.username
            tenant: tenant
            allowed: allowed
            latency_ms: latency_ms
            model: model
      - labels:
          user:
          tenant:
          allowed:

  # Gateway application log
  - job_name: gateway-app
    static_configs:
      - targets: [localhost]
        labels:
          job: bankai-gateway
          source: gateway
          __path__: /var/log/bankai/audit/gateway.log
