worker_processes  1;

events { worker_connections 1024; }

http {
  # Docker DNS (host.docker.internal çözümlemesi için)
  resolver 127.0.0.11 ipv6=off valid=10s;

  # stdout log (docker logs ile gör)
  log_format poc '$remote_addr status=$status req="$request" '
                 'ow_name="$http_x_openwebui_user_name" '
                 'ow_email="$http_x_openwebui_user_email" '
                 'user="$poc_user2" roles="$poc_roles" tenant="$poc_tenant" '
                 'ua="$http_user_agent"';
  access_log /dev/stdout poc;
  error_log  /dev/stderr warn;

  # username: prefer name, else email, else anonymous
  map $http_x_openwebui_user_name $poc_user {
    default $http_x_openwebui_user_name;
    ""      $http_x_openwebui_user_email;
  }

  map $poc_user $poc_user2 {
    default $poc_user;
    ""      "anonymous";
  }

  # user -> roles (PoC)
  map $poc_user2 $poc_roles {
    default "";
    "ali"  "hr";
    "ayse" "compliance";
    "veli" "finance";
  }

  # roles -> tenant
  map $poc_roles $poc_tenant {
    default "";
    "hr"         "hr";
    "compliance" "compliance";
    "finance"    "finance";
  }

  upstream bankai_gateway {
    server host.docker.internal:8000;
    keepalive 16;
  }

  server {
    listen 8080;

    location = /__ping { return 200 "pong\n"; }

    # OpenWebUI'nin OpenAI endpointleri
    location /v1/ {
      # rol yoksa direkt deny
      if ($poc_roles = "") { return 403; }

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # gateway'e ilet
      proxy_pass http://bankai_gateway;

      # bankai headers inject
      proxy_set_header X-User   $poc_user2;
      proxy_set_header X-Roles  $poc_roles;
      proxy_set_header X-Tenant $poc_tenant;

      # debug için request id forward
      proxy_set_header X-Request-Id $request_id;

      # SSE streaming için buffering'i kapat (KRİTİK!)
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;

      proxy_read_timeout  300s;
      proxy_send_timeout  300s;
    }

    # (opsiyonel) /docs falan görmek istersen:
    location / {
      proxy_pass http://bankai_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }
  }
}
