services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:0.68.0
    command: ["run", "--server", "--log-level=debug", "/policies"]
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - ./policies:/policies:ro
    restart: unless-stopped

volumes:
  qdrant_data:
